name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Android project
        run: |
          SETTINGS=$(find . \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -print -quit)

          if [ -z "$SETTINGS" ]; then
            echo "找不到 settings.gradle 或 settings.gradle.kts"
            echo "当前文件列表："
            find . -maxdepth 5 -type f | sort | head -200
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "找到 Android 项目目录：$PROJECT_DIR"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug --stacktrace
          else
            gradle assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ env.PROJECT_DIR }}/**/build/outputs/apk/**/*.apk
